# =============================================================================
# BCG BOD Type Revisions Registry
# =============================================================================
# Repo path:    bcg-ops-knowledge/registries/bod_type_revisions.yaml
# Version:      v0.2
# Status:       [DRAFT — SEED VALUES — PENDING POPULATION]
# Owner:        Gregory Bernardo
# Validated by: P4-RAG-SCH-001 v0.3 (ingest pipeline)
# Last updated: 2026-04-26
#
# v0.2 CHANGES
# - Added `patches` field (per schema v0.3 G-7 / OQ-12).
# - Patch revisions (e.g., v2.3A patches v2.3) are ACTIVE alongside their parent.
# - Supersession applies at family-major level (v2.4 supersedes v2.3 family,
#   which transitions both v2.3 and its patches v2.3A and v2.3B to SUPERSEDED
#   together).
# - Seeded with corpus-visible OPTDC and TDC revisions.
#
# PURPOSE
# This registry is the controlled vocabulary for the `bod_type_revision` field
# in the RAG corpus metadata schema. Each entry pairs a `bod_type` (validated
# against bod_types.yaml) with a specific revision identifier and tracks its
# lifecycle, including patch relationships.
#
# CRITICAL ROLE
# When a BOD revision changes, projects mid-flight may continue conforming to
# the older revision. This registry preserves that history so RFIs and submittals
# answered against an older revision retrieve the correct documents.
# Do not delete superseded entries.
#
# EXTENSION
# To add a new revision:
#   1. Open a PR against this file in bcg-ops-knowledge
#   2. Add the new revision entry as ACTIVE
#   3. If this is a major release that supersedes a prior family:
#      - Update prior major's `superseded_by` and `superseded_date`
#      - Transition all patches of the prior major to SUPERSEDED
#   4. If this is a patch:
#      - Set `patches` to the parent revision code
#      - Both parent and patch remain ACTIVE
#   5. Greg approves and merges
#
# FIELDS
#   code              Revision identifier used in `bod_type_revision` field.
#                     Convention: {bod_type}-{REV_TAG} (e.g., OPTDC-v2.4)
#                     Must be unique across this registry.
#
#   bod_type          Foreign key to bod_types.yaml. Must exist there.
#
#   release_kind      MAJOR | PATCH (NEW in v0.2)
#                     MAJOR: Standalone release that may supersede prior majors.
#                     PATCH: Additive to a parent revision (parent stays ACTIVE).
#
#   patches           Code of the parent revision this patches. (NEW in v0.2)
#                     Only populated when release_kind = PATCH.
#                     Patch + parent are both ACTIVE simultaneously.
#                     null when release_kind = MAJOR.
#
#   issued_date       Date this revision was issued by the BOD owner (client).
#
#   superseded_date   Date this revision was replaced by a new MAJOR. null if ACTIVE.
#                     For PATCH revisions: inherited from parent's supersession.
#
#   superseded_by     Code of the major revision that replaced the family.
#                     null if ACTIVE.
#
#   status            ACTIVE | SUPERSEDED | WITHDRAWN
#                     ACTIVE: current revision; default for new ingest
#                     SUPERSEDED: prior revision; valid for projects ingested
#                                 before supersession
#                     WITHDRAWN: revision withdrawn entirely; not valid for any
#                                project. Distinguished from SUPERSEDED.
#
#   change_summary    Short description of what changed from the prior revision.
#                     High-value field for retrieval; populate when known.
#
#   notes             Free-form internal notes.
# =============================================================================

bod_type_revisions:

  # ===== OPTDC revisions (seeded from corpus) =====

  - code: OPTDC-v2.3
    bod_type: OPTDC
    release_kind: MAJOR
    patches: null
